name: Environment Isolation Checks

on:
  pull_request:
  push:
    branches:
      - hardening-launch-readiness
      - fix-payment-persistence
      - fix-business-ownership-access

jobs:
  isolation-check:
    runs-on: ubuntu-latest
    env:
      APP_ENV: staging
      DATABASE_ENV: staging
      NODE_ENV: development
      VERCEL_ENV: preview
      DATABASE_URL: mysql://staging_user:staging_password@staging-db.example.com:3306/gogi_staging
      DB_NAME: gogi_staging
      DB_HOST: staging-db.example.com
      DB_USER: staging_user
      PRODUCTION_DB_NAME: gogi_prod
      PRODUCTION_DB_HOST_FINGERPRINT: prodhost0001
      PRODUCTION_DB_USER_FINGERPRINT: produser0001
      NEXT_PUBLIC_APP_URL: https://preview-staging.example.vercel.app
      NEXT_PUBLIC_MERCADOPAGO_PUBLIC_KEY: APP_TEST-STAGING-PUBLIC
      MERCADOPAGO_ACCESS_TOKEN: APP_TEST-STAGING-ACCESS
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm install

      - run: node scripts/check-environment-isolation.js

      - run: node --test scripts/lib/db-write-guard.test.js scripts/lib/staging-environment.test.js scripts/verify-staging-environment.test.js scripts/seed-staging-qa.test.js scripts/cleanup-staging-qa.test.js scripts/check-environment-isolation.test.js
